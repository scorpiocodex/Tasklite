<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TaskLite — A lightweight, fast task manager. Add, complete, filter, and clear tasks with a clean, minimal interface." />
    <title>TaskLite — Simple Tasks. Clean Flow.</title>

    <!-- Inline SVG favicon (checkmark in brand blue) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%234f6ef7'/%3E%3Cpath d='M8 16l6 6 10-12' stroke='%23fff' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E" />

    <link rel="stylesheet" href="style.css" />

    <noscript>
      <style>.noscript-banner { display: flex !important; }</style>
    </noscript>
  </head>
  <body>
    <!-- No-JS fallback banner -->
    <div class="noscript-banner" role="alert">
      <strong>JavaScript is required</strong> to use TaskLite. Please enable JavaScript in your browser settings.
    </div>

    <div class="container">
      <!-- Header -->
      <header class="header">
        <div class="header-row">
          <h1 class="logo">TaskLite</h1>
          <span class="pending-badge" id="pendingBadge" aria-label="Pending tasks" hidden></span>
        </div>
        <p class="tagline">Simple Tasks. Clean Flow.</p>
      </header>

      <!-- Add Task Form -->
      <section class="input-section" aria-label="Add a new task">
        <div class="input-row">
          <input
            type="text"
            id="taskInput"
            class="task-input"
            placeholder="What needs to be done?"
            maxlength="200"
            autocomplete="off"
            aria-label="New task title"
          />
          <button id="addBtn" class="btn btn-primary" aria-label="Add task">Add Task</button>
        </div>
        <!-- Inline error message -->
        <p id="errorMsg" class="error-msg" role="status" aria-live="polite"></p>
      </section>

      <!-- Filter Tabs -->
      <div class="filter-tabs" role="tablist" aria-label="Filter tasks">
        <button class="filter-tab active" data-filter="all" role="tab" aria-selected="true">All</button>
        <button class="filter-tab" data-filter="active" role="tab" aria-selected="false">Active</button>
        <button class="filter-tab" data-filter="completed" role="tab" aria-selected="false">Completed</button>
      </div>

      <!-- Task Stats -->
      <section class="stats-bar" id="statsBar" aria-label="Task statistics" aria-live="polite"></section>

      <!-- Task List -->
      <ul class="task-list" id="taskList" aria-label="Task list"></ul>

      <!-- Empty state shown when there are no tasks in the current filter -->
      <div class="empty-state" id="emptyState">
        <span class="empty-icon" aria-hidden="true">📋</span>
        <p id="emptyMsg">No tasks yet. Add one above!</p>
      </div>

      <!-- Clear completed button — hidden until completed tasks exist -->
      <div class="clear-completed-row" id="clearCompletedRow" hidden>
        <button id="clearCompletedBtn" class="btn btn-ghost">Clear completed</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
